<!DOCTYPE html>
<!-- Investor Kit · Listing 3 Brand & Credibility · Design 3B — BUSINESS CARD 1050x600 (3.5"x2" @300, front/back)
     Montserrat + Lato (free Canva fonts). Import-safe: solid fills only, NO css border.
     Credible title (NOT "Wholesaler") per best practice. [BRACKETS] = buyer replaces. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Investor Business Card (3.5x2) — Investor Listing 3B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root { --navy:#1B2A41; --gold:#E8A33D; --ink:#14181F; --paper:#FAF8F4; --slate:#5C6672; --sand:#ECE6DB; --white:#FFFFFF; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#C9CDD3; }
  .page { width:1050px; height:600px; position:relative; overflow:hidden; margin:24px auto; font-family:'Lato',sans-serif; color:var(--ink); }
  @media print { html, body { background:none; } .page { margin:0; page-break-after:always; } }
  @page { size:10.94in 6.25in; margin:0; }
  .mono { font-family:'Montserrat',sans-serif; font-weight:900; display:inline-flex; align-items:center; justify-content:center; }
  .wordmark { font-family:'Montserrat',sans-serif; font-weight:900; text-transform:uppercase; letter-spacing:.02em; }
  .wm-sub { font-family:'Montserrat',sans-serif; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); }
</style>
</head>
<body>

<!-- ============ PAGE 1 · CARD FRONT ============ -->
<section class="page" data-document-role="page" data-label="Business Card — Front" style="background:var(--navy);">
  <div style="position:absolute; top:0; left:0; bottom:0; width:150px; background:var(--gold);"></div>
  <div style="position:absolute; top:70px; left:210px;">
    <div class="mono" style="width:120px; height:120px; background:var(--gold); color:var(--navy); font-size:56px;">[CI]</div>
  </div>
  <div style="position:absolute; top:220px; left:210px; right:70px;">
    <div class="wordmark" style="font-size:60px; color:var(--white);">[Company Name]</div>
    <div class="wm-sub" style="font-size:16px; margin-top:10px;">Real Estate Solutions</div>
  </div>
  <div style="position:absolute; bottom:60px; left:210px; right:70px;">
    <div style="font-family:'Montserrat',sans-serif; font-weight:800; font-size:22px; letter-spacing:.06em; text-transform:uppercase; color:var(--gold);">We buy houses — cash, any condition</div>
  </div>
</section>

<!-- ============ PAGE 2 · CARD BACK ============ -->
<section class="page" data-document-role="page" data-label="Business Card — Back" style="background:var(--paper);">
  <div style="position:absolute; top:64px; left:70px; display:flex; align-items:center; gap:26px;">
    <div class="mono" style="width:96px; height:96px; background:var(--navy); color:var(--gold); font-size:46px;">[CI]</div>
    <div>
      <div class="wordmark" style="font-size:40px; color:var(--navy);">[Company Name]</div>
      <div class="wm-sub" style="font-size:12px; margin-top:6px;">Real Estate Solutions</div>
    </div>
  </div>

  <div style="position:absolute; top:230px; left:70px;">
    <div style="font-family:'Montserrat',sans-serif; font-weight:900; font-size:34px; color:var(--navy);">[Your Name]</div>
    <div style="font-family:'Montserrat',sans-serif; font-weight:700; font-size:15px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-top:6px;">[Title — e.g., Acquisitions Specialist]</div>
  </div>

  <div style="position:absolute; bottom:64px; left:70px; font-size:19px; line-height:1.9; color:var(--ink);">
    <b>[Phone]</b> &nbsp;·&nbsp; [Email]<br>[Website] &nbsp;·&nbsp; [City, ST]
  </div>

  <div style="position:absolute; top:0; right:0; bottom:0; width:26px; background:var(--gold);"></div>
</section>

</body>
</html>
